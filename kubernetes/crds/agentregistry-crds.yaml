                    type:
                      description: Type is the transport type (stdio or streamable-http)
                      type: string
                    url:
                      description: URL is the URL for streamable-http transport
                      type: string
                  required:
                  - type
                  type: object
                type: array
              repository:
                description: Repository is the source code repository information
