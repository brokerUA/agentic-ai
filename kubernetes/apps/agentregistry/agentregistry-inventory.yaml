apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentregistry-inventory-controller
rules:
- apiGroups: ["agentregistry.dev"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["kagent.dev"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces", "pods", "services", "secrets", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentregistry-inventory-controller
subjects:
- kind: ServiceAccount
  name: agentregistry-inventory
  namespace: agentregistry
roleRef:
  kind: ClusterRole
  name: agentregistry-inventory-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
  labels:
    app: agentregistry-inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentregistry-inventory
  template:
    metadata:
      labels:
        app: agentregistry-inventory
    spec:
      serviceAccountName: agentregistry-inventory
      containers:
      - name: controller
        image: ghcr.io/den-vasyliev/agentregistry-inventory:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8083
          name: mcp
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: DISABLE_AUTH
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
spec:
  selector:
    app: agentregistry-inventory
  ports:
  - port: 80
    targetPort: 8080
    name: http
  - port: 8083
    targetPort: 8083
    name: mcp
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
spec:
  parentRefs:
  - name: agentgateway-external
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /registry
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: agentregistry-inventory
      namespace: agentregistry
      port: 80
