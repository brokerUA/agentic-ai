# Source: mcp-governance/templates/controller-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-governance-controller
  namespace: mcp-governance
  labels:
    helm.sh/chart: mcp-governance-0.1.0
    app.kubernetes.io/name: mcp-governance
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-governance
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-governance
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: mcp-governance-controller
      containers:
        - name: controller
          image: ghcr.io/techwithhuz/mcp-governance-controller:0.19.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 8090
              protocol: TCP
          env:
            - name: PORT
              value: "8090"
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
