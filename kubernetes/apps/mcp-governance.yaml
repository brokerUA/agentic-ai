# Source: mcp-governance/templates/governance-policy.yaml
apiVersion: governance.mcp.io/v1alpha1
kind: MCPGovernancePolicy
metadata:
  name: enterprise-mcp-policy
  labels:
    helm.sh/chart: mcp-governance-0.1.0
    app.kubernetes.io/name: mcp-governance
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "1.0.0"
spec:
  aiAgent:
    enabled: false
    model: gemini-2.5-flash
    ollamaEndpoint: http://localhost:11434
    provider: gemini
    scanEnabled: true
    scanInterval: 5m
  excludeNamespaces:
  - kube-system
  - kube-public
  - kube-node-lease
  - local-path-storage
  maxToolsCritical: 15
  maxToolsWarning: 10
  requireAgentGateway: true
  requireCORS: true
  requireJWTAuth: true
  requirePromptGuard: true
  requireRBAC: true
  requireRateLimit: true
  requireTLS: true
  scoringWeights:
    agentGatewayIntegration: 25
    authentication: 20
    authorization: 15
    corsPolicy: 10
    promptGuard: 5
    rateLimit: 5
    tlsEncryption: 10
    toolScope: 10
  severityPenalties:
    critical: 40
    high: 25
    low: 5
    medium: 15
  targetNamespaces: []
  verifiedCatalogScoring:
    checkMaxScores:
      DEP-001: 5
      DEP-002: 10
      DEP-003: 5
      PUB-001: 10
      PUB-002: 10
      PUB-003: 10
      SEC-001: 15
      SEC-002: 10
      TOOL-001: 15
      USE-001: 10
    complianceWeight: 20
    securityWeight: 50
    trustWeight: 30
    unverifiedThreshold: 50
    verifiedThreshold: 70
