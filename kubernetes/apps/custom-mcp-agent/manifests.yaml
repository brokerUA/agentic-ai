apiVersion: v1
kind: Secret
metadata:
  name: mcp-agent-api-key
  namespace: kagent
type: Opaque
stringData:
  api-key: "$GEMINI_API_KEY"
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: mcp-agent-model-config
  namespace: kagent
spec:
  provider: OpenAI
  model: "gemini-2.0-flash"
  openAI:
    # Pointing to the internal Agent Gateway
    baseUrl: "http://agent-gateway.agentgateway-system.svc.cluster.local:8080/v1"
  apiKeySecret: mcp-agent-api-key
  apiKeySecretKey: api-key
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: k8s-pod-mcp
  namespace: kagent
spec:
  transportType: http
  httpTransport:
    path: "/mcp"
    targetPort: 3000
  deployment:
    image: k8s-pod-mcp-server:latest
    imagePullPolicy: Never
    port: 3000
    serviceAccountName: k8s-pod-mcp
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-platform-assistant
  namespace: kagent
spec:
  type: Declarative
  declarative:
    systemMessage: |
      You are a specialized Kubernetes Platform Assistant. 
      Your tone is technical, precise, and helpful.
      You have access to a tool named 'get_pods' which provides a list of pods in a given namespace.
      If the user asks for pod status or lists, use this tool.
      If no namespace is specified, use 'default'.
    modelConfig: mcp-agent-model-config
    tools:
      - type: McpServer
        mcpServer:
          name: k8s-pod-mcp
          toolNames: ["get_pods"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-pod-mcp
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-pod-mcp-clusterrole
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-pod-mcp-clusterrolebinding
subjects:
- kind: ServiceAccount
  name: k8s-pod-mcp
  namespace: kagent
roleRef:
  kind: ClusterRole
  name: k8s-pod-mcp-clusterrole
  apiGroup: rbac.authorization.k8s.io
