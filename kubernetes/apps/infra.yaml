apiVersion: v1
kind: Secret
metadata:
  name: gemini-api-key
  namespace: agentgateway-system
type: Opaque
stringData:
  api-key: "$GEMINI_API_KEY"
  Authorization: "$GEMINI_API_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: gemini-api-key
  namespace: kagent
type: Opaque
stringData:
  api-key: "$GEMINI_API_KEY"
  Authorization: "$GEMINI_API_KEY"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: gemini-backend
  namespace: agentgateway-system
spec:
  ai:
    groups:
      - providers:
          - name: gemini-provider
            gemini:
              model: "gemini-2.5-flash-lite"
            policies:
              auth:
                secretRef:
                  name: gemini-api-key
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agent-gateway
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-route
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agent-gateway
      namespace: agentgateway-system
  hostnames:
    - "model.agent.internal"
    - "agent-gateway.agentgateway-system.svc.cluster.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: gemini-backend
          group: agentgateway.dev
          kind: AgentgatewayBackend
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: basic-agent-grant
  namespace: default
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentgateway-system
  to:
    - group: ""
      kind: Service
