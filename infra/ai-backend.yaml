apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: gemini-backend
  namespace: agentgateway-system
spec:
  ai:
    groups:
      - providers:
          - name: gemini-provider
            gemini:
              model: "gemini-2.5-flash-lite"
            policies:
              auth:
                secretRef:
                  name: llm-api-key
