apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-route
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agent-gateway
      namespace: agentgateway-system
  hostnames:
    - "model.agent.internal"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: gemini-backend
          group: agentgateway.dev
          kind: AgentgatewayBackend
          port: 8080
